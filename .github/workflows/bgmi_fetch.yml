name: BGMI Daily Fetch

on:
  schedule:
    - cron: '30 1 * * *'  # Runs daily at 7 AM IST (1:30 AM UTC)
  workflow_dispatch:        # Allows manual "Run now" button

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetcher
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OUTPUT_DIR: ./data
        run: python bgmi_fetcher.py

      - name: Commit and push CSVs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Daily BGMI fetch $(date +'%Y-%m-%d')"
          git push
